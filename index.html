<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Agro Forte, futuro sustentável!</title>
</head>
<body>
    <header class="cabecalho">
        <h1 class="cabecalho-titulo-principal">AgroFuturo</h1>
        <div class="cabecalho-div-lista">
            <ul>
                <li class="cabecalho-item-lista">O Problema</li>
                <li class="cabecalho-item-lista">Nossa Solução</li>
                <li class="cabecalho-item-lista">Próxima geração</li>
            </ul>
        </div>
        <div class="cabecalho-div-inversao">
            <button class="cabecalho-titulo-botao">Inversão de cores🌓</button>
        </div>
    </header>
    
    <main class="conteudo-principal">
        <section class="conteudo-secao-sustentavel">
            <div class="conteudo-sustentavel-texto">
                <h1 class="conteudo-sustentavel-titulo">Agro é forte e o futuro é <span>sustentável</span>
                </h1>
                <p class="conteudo-sustentavel-paragrafo">
                    Como a tecnologia e a inteligência artificial estão salvando o planeta e otimizando a produção de alimentos.
                </p>
                <a href="#" class="sustentavel-botao">Conhecer Solução</a>
            </div>
            <div class="conteudo-sustentavel-imagem">
                <img src="drone.jpg" alt="Drone pulverizando a plantação"
                 class="imagem-sustentavel">
            </div>
        </section>
    </main>

    <footer class="rodape">

    </footer>
</body>
</html>
